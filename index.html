<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>單字卡學習</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://code.responsivevoice.org/responsivevoice.js?key=C065BhbX"></script>
</head>
<body>
    <div class="container">
        <div class="checkbox-container">
            <label>
                <input type="checkbox" id="hideAddCard">
                隱藏新增單詞卡
            </label>
            <label>
                <input type="checkbox" id="hideSettings" checked>
                隱藏設置
            </label>
        </div>

        <div class="add-card-section">
            <div class="input-group">
                <div class="input-row">
                    <textarea id="englishWord" placeholder="請輸入中文或英文" rows="1"></textarea>
                    <button id="pasteInputBtn" class="input-action-btn" type="button">一鍵貼上</button>
                </div>
                <div class="input-row">
                    <textarea id="chineseTranslation" placeholder="系統自動翻譯結果" rows="1" readonly></textarea>
                    <button id="copyTranslationBtn" class="input-action-btn" type="button">一鍵複製</button>
                </div>
            </div>
            <div class="button-group">
                <div class="rating-input-group">
                    <div class="star-rating" id="newCardRating">
                        <span class="star" data-rating="1">★</span>
                        <span class="star" data-rating="2">★</span>
                        <span class="star" data-rating="3">★</span>
                        <span class="star" data-rating="4">★</span>
                        <span class="star" data-rating="5">★</span>
                    </div>
                    <span id="ratingValue">3</span>
                </div>
                <button id="addCard">新增單字卡</button>
                <button id="translateBtn" class="translate-btn">翻譯</button>
            </div>
            <div class="display-mode playback-row playback-actions" style="margin-top: 10px;">
                <button id="playAllCards" class="mode-btn">開始播放</button>
                <button id="shuffleCards" class="mode-btn">隨機排列</button>
            </div>
            <div class="display-mode playback-row playback-settings" style="margin-top: 8px;">
                <label>播放次數：</label>
                <input type="number" id="playCountInput" min="1" max="10" value="2">
                <span>次</span>
                <label>播放間隔：</label>
                <input type="number" id="playIntervalInput" min="1" max="30" value="3">
                <span>秒</span>
            </div>
        </div>

        <div class="article-search-panel">
            <div class="article-search-controls">
                <label class="wiki-lang-label">
                    <select id="articleSource" class="wiki-lang-select">
                        <option value="news_zh" selected>Google 新聞（繁中・較新）</option>
                        <option value="news_en">Google 新聞（英文・較新）</option>
                        <option value="grokipedia">Grokipedia 全文（輸入條目 slug，如 Artificial_intelligence）</option>
                    </select>
                </label>
                <input type="text" id="articleSearchInput" class="article-search-input" placeholder="新聞：輸入關鍵字；Grokipedia：輸入條目名" autocomplete="off">
                <button type="button" id="articleSearchBtn" class="input-action-btn">搜尋</button>
            </div>
            <p class="article-search-hint">新聞：搜尋後只顯示標題與日期；點選一則後才在下方組合 RSS 摘要（約 1000 字內）。RSS 經 allorigins → Jina → corsproxy 依序嘗試（各約 6.5 秒逾時）。請用本機伺服器開啟（勿用 file://）。Grokipedia：搜尋後點標題看預覽。一鍵存入後播放仍唸「英文」欄位。</p>
            <div id="articleSearchResults" class="article-search-results" aria-live="polite"></div>
        </div>

        <!-- 顯示和排序控制區（不受隱藏設置控制） -->
        <div class="control-section hidden">
            <div class="display-mode">
                <label>顯示模式：</label>
                <button id="showAll" class="mode-btn active">顯示全部</button>
                <button id="showEnglish" class="mode-btn">只顯示英文</button>
                <button id="showChinese" class="mode-btn">只顯示中文</button>
                <button id="editMode" class="mode-btn">編輯模式</button>
                <button id="darkMode" class="mode-btn">夜間模式</button>
            </div>
            <div class="display-mode" style="margin-top: 8px;">
                <label>排序方式：</label>
                <button id="sortByTime" class="mode-btn active">最新在前</button>
                <button id="sortByRating" class="mode-btn">按星級</button>
                <button id="sortByAlphabet" class="mode-btn">按字母</button>
            </div>
        </div>

        <div class="cards-container" id="cardsContainer">
            <!-- 單字卡將在這裡動態生成 -->
        </div>
        <div id="loadMoreTrigger" class="load-more-trigger"></div>
    </div>
    <script src="main.js"></script>
</body>
</html>
